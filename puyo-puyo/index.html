<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぷよぷよ 💎 宝石版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- メニュー画面 -->
  <div id="menu" class="screen">
    <h1>💎 ぷよぷよ 💎</h1>
    <div class="menu-buttons">
      <button id="btn-solo" class="menu-btn">ひとりで</button>
      <button id="btn-vs" class="menu-btn">CPUと対戦</button>
    </div>
    <div class="howto">
      <div class="label">操作方法</div>
      <div>← →　移動 ／ ↑　回転 ／ ↓　落下</div>
      <div>Space　一気落下 ／ P　一時停止</div>
      <div class="hint">宝石を4つ以上つなげて消そう！連鎖で相手におじゃまを送れるよ</div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="game-screen" class="screen hidden">
    <div class="topbar">
      <button id="btn-pause">⏸ 一時停止</button>
      <button id="btn-mute">🔊 音あり</button>
      <button id="btn-quit">メニューへ</button>
    </div>
    <div id="stage"></div>
    <div id="message"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
